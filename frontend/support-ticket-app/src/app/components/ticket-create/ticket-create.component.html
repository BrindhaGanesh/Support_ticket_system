<div class="layout">
  <nav class="navbar">
    <span class="brand">🎫 Support Tickets</span>
    <a routerLink="/tickets" class="btn-back">← Back to Tickets</a>
  </nav>

  <div class="content">
    <div class="form-card">
      <h2>Create New Ticket</h2>
      <p class="subtitle">Describe your issue and we'll look into it</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Title</label>
          <input type="text" formControlName="title" placeholder="Brief summary of the issue"/>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea formControlName="description" rows="4" placeholder="Describe the issue in detail..."></textarea>
        </div>

        <div class="form-group">
          <label>Priority</label>
          <select formControlName="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>

        <div class="error" *ngIf="error">{{ error }}</div>

        <div class="form-actions">
          <a routerLink="/tickets" class="btn-cancel">Cancel</a>
          <button type="submit" [disabled]="loading">
            {{ loading ? 'Submitting...' : 'Submit Ticket' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
